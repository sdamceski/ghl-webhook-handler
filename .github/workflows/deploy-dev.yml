name: Deploy GHL webhook listener (dev)

on:
  push:
    branches:
      - dev-lambda
  workflow_dispatch:

jobs:
  deploy-dev:
    name: Deploy Lambda via SAM (dev)
    environment:
      name: dev
    runs-on: [self-hosted, dev]

    permissions:
      id-token: write
      contents: read

    env:
      AWS_REGION: us-east-2

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials (dev)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEV_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build with SAM
        run: sam build

      - name: Update Lambda code (dev)
        run: |
          python3 - <<'PY'
          import os
          import zipfile

          build_dir = ".aws-sam/build/GhlWebhookListenerFunction"
          zip_path = "/tmp/ghl-webhook-events-dev.zip"

          if os.path.exists(zip_path):
              os.remove(zip_path)

          with zipfile.ZipFile(zip_path, "w", zipfile.ZIP_DEFLATED) as zf:
              for root, dirs, files in os.walk(build_dir):
                  for name in files:
                      full_path = os.path.join(root, name)
                      rel_path = os.path.relpath(full_path, build_dir)
                      zf.write(full_path, rel_path)

          print(f"Created {zip_path}")
          PY

          aws lambda update-function-code \
            --function-name ghl-webhook-events-dev \
            --zip-file fileb:///tmp/ghl-webhook-events-dev.zip
